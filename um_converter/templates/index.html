<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UM Converter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background: linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
transition:0.3s;
}

.dark-mode{
background:#121212;
color:white;
}

.navbar{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(10px);
}

.card-glass{
background: rgba(255,255,255,0.2);
border-radius:20px;
padding:25px;
backdrop-filter: blur(10px);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.dark-mode .card-glass{
background:#1e1e1e;
}

.drop-zone{
border:2px dashed white;
border-radius:15px;
padding:20px;
text-align:center;
cursor:pointer;
}

.preview{
margin-top:10px;
max-height:150px;
}

.loader{
display:none;
border:6px solid #f3f3f3;
border-top:6px solid #007bff;
border-radius:50%;
width:40px;
height:40px;
animation: spin 1s linear infinite;
margin:auto;
margin-top:10px;
}

@keyframes spin{
0%{ transform:rotate(0deg);}
100%{ transform:rotate(360deg);}
}

.toggle-btn{
cursor:pointer;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark p-3">

<span class="navbar-brand">
<i class="fa fa-file-pdf"></i> UM Converter
</span>

<button onclick="toggleDark()" class="btn btn-light toggle-btn">

🌙 Dark Mode

</button>

</nav>

<div class="container mt-4">

<h2 class="text-center mb-4">

Universal File Converter

</h2>

<div class="row">

<!-- ANY TO PDF -->

<div class="col-md-6">

<div class="card-glass">

<h4>Any → PDF</h4>

<form action="/image_to_pdf" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="drop-zone">

<input type="file" name="file" onchange="previewFile(event)" required>

<p>Upload Image</p>

<img id="preview" class="preview">

</div>

<button class="btn btn-success w-100 mt-2">

Convert Image to PDF

</button>

<div class="loader" id="loader"></div>

</form>

<hr>

<form action="/word_to_pdf" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="drop-zone">

<input type="file" name="file" required>

<p>Upload Word File</p>

</div>

<button class="btn btn-light w-100 mt-2">

Word to PDF

</button>

<div class="loader"></div>

</form>

<hr>

<form action="/ppt_to_pdf" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="drop-zone">

<input type="file" name="file" required>

<p>Upload PPT</p>

</div>

<button class="btn btn-primary w-100 mt-2">

PPT to PDF

</button>

<div class="loader"></div>

</form>

</div>

</div>

<!-- PDF TO ANY -->

<div class="col-md-6">

<div class="card-glass">

<h4>PDF → Any</h4>

<form action="/pdf_to_word" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="drop-zone">

<input type="file" name="file" required>

<p>Upload PDF</p>

</div>

<button class="btn btn-warning w-100 mt-2">

PDF to Word

</button>

<div class="loader"></div>

</form>

<hr>

<form action="/pdf_to_text" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="drop-zone">

<input type="file" name="file" required>

<p>Upload PDF</p>

</div>

<button class="btn btn-danger w-100 mt-2">

PDF to Text

</button>

<div class="loader"></div>

</form>

<hr>

<form action="/pdf_to_ppt" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="drop-zone">

<input type="file" name="file" required>

<p>Upload PDF</p>

</div>

<button class="btn btn-success w-100 mt-2">

PDF to PPT

</button>

<div class="loader"></div>

</form>

</div>

</div>

</div>

</div>

<script>

function showLoader(){

document.querySelectorAll(".loader").forEach(l => l.style.display="block")

}

function previewFile(event){

const file = event.target.files[0]

if(file.type.startsWith("image")){

const reader = new FileReader()

reader.onload = function(){

document.getElementById("preview").src = reader.result

}

reader.readAsDataURL(file)

}

}

function toggleDark(){

document.body.classList.toggle("dark-mode")

}

</script>

</body>

</html>
