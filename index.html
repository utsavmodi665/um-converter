<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UM Converter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background: linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
transition:0.3s;
}

.dark-mode{
background:#121212;
color:white;
}

.navbar{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(10px);
}

.hero{
text-align:center;
margin-top:40px;
margin-bottom:30px;
}

.card-glass{
background: rgba(255,255,255,0.2);
border-radius:20px;
padding:30px;
backdrop-filter: blur(10px);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.dark-mode .card-glass{
background:#1e1e1e;
}

.drop-zone{
border:2px dashed white;
border-radius:20px;
padding:40px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.drop-zone:hover{
background:rgba(255,255,255,0.2);
}

.preview{
max-height:120px;
margin-top:10px;
}

.loader{
display:none;
border:6px solid #f3f3f3;
border-top:6px solid #007bff;
border-radius:50%;
width:50px;
height:50px;
animation: spin 1s linear infinite;
margin:auto;
margin-top:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.convert-box{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:15px;
}

.select-box{
padding:10px;
border-radius:10px;
border:none;
}

.btn-convert{
padding:12px 25px;
border-radius:30px;
font-weight:bold;
}

.footer{
margin-top:40px;
text-align:center;
opacity:0.8;
}

</style>

</head>

<body>

<nav class="navbar p-3">

<div class="container">

<span class="navbar-brand text-white">

<i class="fa fa-file-pdf"></i> UM Converter

</span>

<button onclick="toggleDark()" class="btn btn-light">

🌙 Dark Mode

</button>

</div>

</nav>

<div class="container">

<div class="hero">

<h1>Universal File Converter</h1>

<p>Fast • Secure • Professional</p>

</div>

<div class="card-glass">

<form id="convertForm" method="post" enctype="multipart/form-data">

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">

<i class="fa fa-cloud-upload fa-2x"></i>

<p>Drag & Drop or Click to Upload</p>

<input type="file" id="fileInput" name="file" hidden onchange="previewFile(event)" required>

<img id="preview" class="preview">

<p id="fileName"></p>

</div>

<div class="convert-box">

<select id="convertType" class="select-box">

<option value="image_to_pdf">Image → PDF</option>

<option value="word_to_pdf">Word → PDF</option>

<option value="text_to_pdf">Text → PDF</option>

<option value="pdf_to_word">PDF → Word</option>

<option value="pdf_to_text">PDF → Text</option>

</select>

<i class="fa fa-arrow-right"></i>

<button class="btn btn-primary btn-convert">

Convert

</button>

</div>

<div class="loader" id="loader"></div>

</form>

</div>

<div class="footer">

<p>UM Converter • Professional File Conversion Tool</p>

</div>

</div>

<script>

const form = document.getElementById("convertForm")

form.addEventListener("submit", function(){

const type = document.getElementById("convertType").value

form.action = "/" + type

document.getElementById("loader").style.display="block"

})

function previewFile(event){

const file = event.target.files[0]

document.getElementById("fileName").innerText=file.name

if(file.type.startsWith("image")){

const reader = new FileReader()

reader.onload=function(){

document.getElementById("preview").src=reader.result

}

reader.readAsDataURL(file)

}

}

function toggleDark(){

document.body.classList.toggle("dark-mode")

}

</script>

</body>

</html>
